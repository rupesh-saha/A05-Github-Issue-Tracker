<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  
  <link rel="shortcut icon" href="assets/github-logo.png">
  <link rel="stylesheet" href="style.css">
  <title>GitHub Issues Tracker</title>
</head>
<body class="bg-[#f8fafc] pb-9">

  <header>
    
    <div class="navbar bg-base-100 shadow-sm md:px-10">
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
            <li><input type="text" placeholder="Search issues..." id="search-input-device" class="input input-bordered w-50 md:w-auto" /></li>
            
            <li><button id="search-btn-device" class="btn btn-primary font-bold rounded-md"><i class="fa-solid fa-circle-plus"></i> Search</button></li>
          </ul>
        </div>
        <a class="btn btn-ghost text-xl font-semibold">
          <img src="assets/github-logo.png" class="w-6 md:w-9" alt="">
          GitHub Issues Tracker</a>
      </div>
      <div class="navbar-end hidden md:flex gap-3">
        <input id="search-input" type="text" placeholder="Search issues..." class="input input-bordered w-15 md:w-auto" />
        <button id="search-btn" class="btn btn-primary font-bold rounded-md"><i class="fa-solid fa-circle-plus"></i> Search</button>
      </div>
    </div>
    
  </header>

  <section class="max-w-11/12 md:max-w-10/12 mx-auto bg-base-100 shadow-sm border border-base-200 mt-7 md:mt-14 p-6 rounded-lg mb-4">
    
    <div class="flex gap-3 mx-auto justify-center md:justify-start">
      <button onclick="switchTab('all')" id="all-btn" class="btn btn-soft btn-primary active tab-btn">All</button>
      <button onclick="switchTab('open')" id="open-btn" class="btn btn-soft btn-primary tab-btn">Open</button>
      <button onclick="switchTab('closed')" id="closed-btn" class="btn btn-soft btn-primary tab-btn">Closed</button>
    </div>

  </section>

  <section class="max-w-11/12 md:max-w-10/12 mx-auto bg-base-100 shadow-sm border border-base-200 p-6 rounded-lg mb-4">

    <div class="flex flex-col gap-5 md:flex-row md:justify-between items-center">

      <div class="flex gap-3 items-center">
        <img src="assets/Group 1.png" alt="">
        <div>
          <h2 class="font-bold"><span id="issue-counter">0</span> Issues</h2>
          <p class="font-light text-[#64748B]">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex gap-6">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
          <span class="font-semibold">Open</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
          <span class="font-semibold">Closed</span>
        </div>
      </div>

    </div>
    
  </section>

  <section id="issue-container" class="max-w-11/12 md:max-w-10/12 mx-auto bg-gray-100 shadow-sm border border-base-200 p-5 rounded-lg mb-4 grid grid-cols-1 md:grid-cols-4 gap-3 gap-y-4">

  </section>

  
  <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box p-8">
      <div id="details-container">

      </div>
      <div class="modal-action">
        <form method="dialog">
          <button class="btn btn-primary">Close</button>
        </form>
      </div>
    </div>
  </dialog>

  
  <script src="script-files/script-main.js"></script>
</body>
</html>

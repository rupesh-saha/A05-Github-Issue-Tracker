<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  
  <link rel="shortcut icon" href="assets/github-logo.png">
  <link rel="stylesheet" href="style.css">
  <title>GitHub Issues Tracker</title>
</head>
<body>

  <header>
    
    <div class="navbar bg-base-100 shadow-sm md:px-10">
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
            <li><input type="text" placeholder="Search issues..." class="input input-bordered w-50 md:w-auto" /></li>
            
            <li><button class="btn btn-primary font-bold rounded-md"><i class="fa-solid fa-circle-plus"></i> New Issues</button></li>
          </ul>
        </div>
        <a class="btn btn-ghost text-xl font-semibold">
          <img src="assets/github-logo.png" class="w-6 md:w-9" alt="">
          GitHub Issues Tracker</a>
      </div>
      <div class="navbar-end hidden md:flex gap-3">
        <input type="text" placeholder="Search issues..." class="input input-bordered w-15 md:w-auto" />
        <button class="btn btn-primary font-bold rounded-md"><i class="fa-solid fa-circle-plus"></i> New Issues</button>
      </div>
    </div>
    
  </header>

  
  
</body>
</html>

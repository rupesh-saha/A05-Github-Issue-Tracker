<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  
  <link rel="shortcut icon" href="assets/github-logo.png">
  <link rel="stylesheet" href="style.css">
  <title>GitHub Issues Tracker - Sign In</title>
</head>

<body class="min-h-dvh bg-base-100 flex items-center justify-center p-4">

  <div class="w-full flex flex-col items-center">


    <main class="md:p-6 flex flex-col items-center">

      <div class="card card-compact bg-base-100 max-w-md w-full p-8 shadow-md rounded-2xl flex flex-col items-center">
        
        <img src="assets/github-logo.png">

        <h2 class="text-3xl font-bold text-base-content text-center mb-1">GitHub Issues Tracker</h2>
        <p class="text-base-content/70 text-center mb-10">Sign in to manage your issues</p>

        <form class="w-full">
          <div class="form-control w-full mb-6">
            <label class="label">
              <span class="label-text text-base-content font-medium">Username</span>
            </label>
            <input id="username-input" type="text" placeholder="Enter Username" class="input input-bordered input-primary w-full rounded-md" />
          </div>

          <div class="w-full mb-8">
            <label class="label">
              <span class="label-text text-base-content font-medium">Password</span>
            </label>
            <input id="password-input" type="password" placeholder="Enter Password" class="input input-bordered input-primary w-full rounded-md" />
          </div>         
        </form>

        <button id="sign-btn" class="btn btn-primary btn-block rounded-xl">Sign In</button>

        <div class="text-center w-full mt-4">
          <p class="text-sm text-base-content/70 mb-3">Demo Credentials:</p>
          <div class="p-5 bg-base-300/50 rounded-xl w-full text-left inline-block">
            <div class="flex gap-2">
              <span class="font-bold text-base-content">Username:</span>
              <span class="text-base-content/90">admin</span>
            </div>
            <div class="flex gap-2 mt-1">
              <span class="font-bold text-base-content">Password:</span>
              <span class="text-base-content/90">admin123</span>
            </div>
          </div>
        </div>

      </div>

    </main>

  </div>

  <script src="script-files/login.js"></script>
</body>
</html>
